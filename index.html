<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC - Monitor Interno de Red</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f1f5f9;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .navbar-noc {
            background-color: #0f172a;
            border-bottom: 3px solid #ea580c;
        }
        .card-indicador {
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .card-indicador:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .bg-cfo { background: linear-gradient(135deg, #dc2626, #991b1b); }
        .bg-afo { background: linear-gradient(135deg, #d97706, #92400e); }
        .bg-pow { background: linear-gradient(135deg, #2563eb, #1e40af); }
        .bg-total { background: linear-gradient(135deg, #475569, #334155); }
        
        .tabla-contenedor {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .status-dot {
            height: 10px;
            width: 10px;
            border-radius: 50%;
            display: inline-block;
            background-color: #10b981;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-noc py-3 shadow">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="#">
                <span class="status-dot me-2"></span>
                <span>NOC - SINCRO LIVE</span>
            </a>
            <div class="d-flex align-items-center text-white gap-3">
                <span class="badge bg-dark p-2 text-warning border border-warning" id="estado-conexion">Conectando...</span>
                <span class="badge bg-success p-2" id="reloj">00:00:00</span>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4 mt-4">
        
        <div class="row g-3 mb-4">
            <div class="col-6 col-lg-3" onclick="filtrarPorTipo('TODOS')">
                <div class="card card-indicador bg-total p-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-uppercase text-white-50 small fw-bold m-0">Alertas Activas</h6>
                            <h2 class="fw-bold m-0 mt-1" id="num-total">0</h2>
                        </div>
                        <i class="fa-solid fa-network-wired fa-2x text-white-50"></i>
                    </div>
                </div>
            </div>
            <div class="col-6 col-lg-3" onclick="filtrarPorTipo('CFO')">
                <div class="card card-indicador bg-cfo p-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-uppercase text-white-50 small fw-bold m-0">Cortes (CFO)</h6>
                            <h2 class="fw-bold m-0 mt-1" id="num-cfo">0</h2>
                        </div>
                        <i class="fa-solid fa-scissors fa-2x text-white-50"></i>
                    </div>
                </div>
            </div>
            <div class="col-6 col-lg-3" onclick="filtrarPorTipo('AFO')">
                <div class="card card-indicador bg-afo p-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-uppercase text-white-50 small fw-bold m-0">Atenuación (AFO)</h6>
                            <h2 class="fw-bold m-0 mt-1" id="num-afo">0</h2>
                        </div>
                        <i class="fa-solid fa-chart-line-down fa-2x text-white-50"></i>
                    </div>
                </div>
            </div>
            <div class="col-6 col-lg-3" onclick="filtrarPorTipo('POW')">
                <div class="card card-indicador bg-pow p-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-uppercase text-white-50 small fw-bold m-0">Energía (POW)</h6>
                            <h2 class="fw-bold m-0 mt-1" id="num-pow">0</h2>
                        </div>
                        <i class="fa-solid fa-bolt-lightning fa-2x text-white-50"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-12">
                <div class="bg-white p-3 rounded-3 shadow-sm d-flex gap-2">
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-magnifying-glass text-muted"></i></span>
                        <input type="text" id="buscador" class="form-control border-start-0 bg-light" placeholder="Escribe el nombre de un equipo, OLT, distrito o región técnica..." onkeyup="ejecutarFiltroGeneral()">
                    </div>
                    <button class="btn btn-outline-dark" onclick="solicitarDatosReales()"><i class="fa-solid fa-arrows-rotate"></i></button>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="tabla-contenedor p-3">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="m-0 fw-bold text-secondary">
                            <i class="fa-solid fa-list-check me-2"></i>Alarmas Registradas en Producción
                        </h5>
                        <span class="badge bg-secondary" id="tag-filtro">Vista: Todos</span>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle m-0" id="tablaMaster">
                            <thead class="table-light border-bottom">
                                <tr>
                                    <th>Elemento de Red / OLT</th>
                                    <th>Tipo de Evento</th>
                                    <th>Región / Entidad</th>
                                    <th>Clientes Afectados</th>
                                    <th>Inicio Reportado</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="5" class="text-center text-muted py-4">Esperando respuesta del Cloudflare Worker...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Endpoint configurado apuntando a tu Cloudflare Worker
        const WORKER_URL = "https://noc-api-bridge.playtotalito.workers.dev";
        
        // Memoria interna de la aplicación
        let datasetAlarmas = [];
        let filtroTipoActual = "TODOS";

        window.onload = function() {
            solicitarDatosReales();
            
            // Reloj en tiempo real en la barra superior
            setInterval(() => {
                document.getElementById('reloj').innerText = new Date().toLocaleTimeString();
            }, 1000);

            // Consultar actualizaciones automáticamente cada 3 minutos
            setInterval(solicitarDatosReales, 180000);
        };

        // Función principal que consume el Worker
        async function solicitarDatosReales() {
            const indicadorConexion = document.getElementById('estado-conexion');
            indicadorConexion.className = "badge bg-warning text-dark";
            indicadorConexion.innerText = "Sincronizando...";

            try {
                let respuesta = await fetch(WORKER_URL);
                if (!respuesta.ok) {
                    throw new Error(`HTTP Error: ${respuesta.status}`);
                }
                
                // Conversión de datos reales
                let JSON_NOC = await respuesta.json();
                
                // Normalización de propiedades: Dependiendo de cómo mapee el backend,
                // nos aseguramos de asignar los valores correspondientes.
                datasetAlarmas = JSON_NOC.map((item, index) => {
                    return {
                        id: item.id || index,
                        olt: item.olt || item.oltName || item.elemento || "ELEMENTO_DESCONOCIDO",
                        tipo: (item.tipo || item.tipoAlarma || "CFO").toUpperCase().trim(),
                        region: item.ubicacion || item.region || item.distrito || "N/A",
                        clientes: item.clientesCount || item.userCount || item.afectados || 0,
                        fecha: item.inicio || item.fechaInicio || "--/--/--"
                    };
                });

                indicadorConexion.className = "badge bg-success";
                indicadorConexion.innerText = "ONLINE";

                renderizarContadores();
                ejecutarFiltroGeneral();

            } catch (error) {
                console.error("Error en la sincronización:", error);
                indicadorConexion.className = "badge bg-danger";
                indicadorConexion.innerText = "ERROR DE ENLACE";
                
                const tbody = document.querySelector("#tablaMaster tbody");
                tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger py-4"><i class="fa-solid fa-triangle-exclamation me-2"></i>No se pudo obtener respuesta de tu Worker. Verifica la validez de la Cookie interna.</td></tr>`;
            }
        }

        // Calcula el total de elementos activos por categoría
        function renderizarContadores() {
            let total = datasetAlarmas.length;
            let cfos = datasetAlarmas.filter(x => x.tipo === "CFO" || x.tipo === "CORTE").length;
            let afos = datasetAlarmas.filter(x => x.tipo === "AFO" || x.tipo === "ATENUACION").length;
            let pows = datasetAlarmas.filter(x => x.tipo === "POW" || x.tipo === "ENERGIA").length;

            document.getElementById('num-total').innerText = total;
            document.getElementById('num-cfo').innerText = cfos;
            document.getElementById('num-afo').innerText = afos;
            document.getElementById('num-pow').innerText = pows;
        }

        function filtrarPorTipo(tipo) {
            filtroTipoActual = tipo;
            document.getElementById('tag-filtro').innerText = `Vista: ${tipo}`;
            ejecutarFiltroGeneral();
        }

        // Procesa las búsquedas del campo de texto combinadas con los clics de los contadores
        function ejecutarFiltroGeneral() {
            let busqueda = document.getElementById('buscador').value.toLowerCase().trim();

            let datosFiltrados = datasetAlarmas.filter(item => {
                let coincideTipo = (filtroTipoActual === "TODOS" || item.tipo === filtroTipoActual);
                let coincideTexto = item.olt.toLowerCase().includes(busqueda) || 
                                     item.region.toLowerCase().includes(busqueda) || 
                                     item.tipo.toLowerCase().includes(busqueda);
                return coincideTipo && coincideTexto;
            });

            dibujarTabla(datosFiltrados);
        }

        // Dibuja dinámicamente las filas HTML recibidas de producción
        function dibujarTabla(datos) {
            const tbody = document.querySelector("#tablaMaster tbody");
            tbody.innerHTML = "";

            if (datos.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-4">No se encontraron alarmas que coincidan con el criterio actual.</td></tr>`;
                return;
            }

            datos.forEach(row => {
                let badgeClase = "bg-danger";
                if(row.tipo === "AFO" || row.tipo === "ATENUACION") badgeClase = "bg-warning text-dark";
                if(row.tipo === "POW" || row.tipo === "ENERGIA") badgeClase = "bg-primary";

                let tr = `
                    <tr>
                        <td class="fw-bold text-dark">${row.olt}</td>
                        <td><span class="badge ${badgeClase}">${row.tipo}</span></td>
                        <td><i class="fa-solid fa-location-dot me-1 text-muted"></i>${row.region}</td>
                        <td class="fw-bold text-secondary"><i class="fa-solid fa-users me-1"></i>${row.clientes}</td>
                        <td class="small text-muted">${row.fecha}</td>
                    </tr>
                `;
                tbody.innerHTML += tr;
            });
        }
    </script>
</body>
</html>
