<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPFFM - Registro de Splitter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col justify-between font-sans">

    <header class="bg-blue-700 text-white p-4 shadow-md flex items-center">
        <button class="mr-4 text-xl">←</button>
        <h1 class="text-lg font-bold">Registro de Splitter</h1>
    </header>

    <main class="flex-1 p-4 max-w-md mx-auto w-full">
        <div class="bg-white p-6 rounded-lg shadow-md space-y-4">
            
            <form id="splitterForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Código QR / Barras</label>
                    <div class="flex rounded-md shadow-sm">
                        <input type="text" id="splitterQR" required
                            class="flex-1 block w-full rounded-l-md border-gray-300 border p-2 text-gray-900 focus:ring-blue-500 focus:border-blue-500 sm:text-sm" 
                            placeholder="Escanee o ingrese el QR">
                        <button type="button" id="btnScan" class="inline-flex items-center px-3 rounded-r-md border border-l-0 border-gray-300 bg-gray-50 text-gray-500 text-sm hover:bg-gray-100">
                            📷
                        </button>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Etiqueta (Label ID)</label>
                    <input type="text" id="labelId" required
                        class="block w-full rounded-md border-gray-300 border p-2 text-gray-900 focus:ring-blue-500 focus:border-blue-500 sm:text-sm" 
                        placeholder="Ej. RE-JUA-01-SPL-02">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Modelo de Splitter</label>
                    <input type="text" id="model" required
                        class="block w-full rounded-md border-gray-300 border p-2 text-gray-900 focus:ring-blue-500 focus:border-blue-500 sm:text-sm" 
                        placeholder="Ej. Huawei OptiX DTS">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Número de Puertos</label>
                    <input type="number" id="portNumber" required
                        class="block w-full rounded-md border-gray-300 border p-2 text-gray-900 focus:ring-blue-500 focus:border-blue-500 sm:text-sm" 
                        placeholder="Ej. 8 o 16">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Dirección / Ubicación</label>
                    <textarea id="address" rows="2" required
                        class="block w-full rounded-md border-gray-300 border p-2 text-gray-900 focus:ring-blue-500 focus:border-blue-500 sm:text-sm" 
                        placeholder="Dirección física o coordenadas geográficas"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Estado</label>
                    <select id="status" class="block w-full rounded-md border-gray-300 border p-2 bg-white text-gray-900 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                        <option value="Disponible">Disponible</option>
                        <option value="Activo">Activo</option>
                        <option value="Dañado">Dañado / Mantenimiento</option>
                    </select>
                </div>
            </form>

        </div>
    </main>

    <footer class="p-4 bg-gray-100 max-w-md mx-auto w-full">
        <button type="button" id="btnContinue" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg shadow-lg hover:bg-blue-700 transition duration-200">
            CONTINUAR
        </button>
    </footer>

    <script>
        document.getElementById('btnContinue').addEventListener('click', async () => {
            // 1. Recolección y limpieza de datos (Sanitización básica)
            const payload = {
                qr_code: document.getElementById('splitterQR').value.trim().toUpperCase(),
                label: document.getElementById('labelId').value.trim(),
                model: document.getElementById('model').value.trim(),
                port_number: parseInt(document.getElementById('portNumber').value, 10),
                address: document.getElementById('address').value.trim(),
                status: document.getElementById('status').value,
                registered_at: new Date().toISOString()
            };

            // Validación rápida antes de enviar
            if(!payload.qr_code || !payload.label || isNaN(payload.port_number)) {
                alert("Por favor, llena todos los campos obligatorios.");
                return;
            }

            // 2. Envío al Cloudflare Worker
            try {
                const response = await fetch('https://tu-worker.tu-subdominio.workers.dev/api/splitter', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (response.ok) {
                    alert("✅ Splitter dado de alta exitosamente con el código QR.");
                    document.getElementById('splitterForm').reset();
                } else {
                    alert("❌ Error: " + result.message);
                }
            } catch (error) {
                console.error("Error de conexión:", error);
                alert("❌ No se pudo conectar con el servidor. Revisa tu conexión a internet.");
            }
        });

        // Simulación o integración del botón de cámara si usas WebView/Lector externo
        document.getElementById('btnScan').addEventListener('click', () => {
            console.log("Detonando lector nativo/cámara...");
            // Aquí puedes enlazar tu lógica o puente JS en caso de usar un WebView nativo.
        });
    </script>
</body>
</html>
