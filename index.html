<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPFFM - Documentación de Planta Externa</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans flex flex-col justify-between">

    <header class="bg-blue-700 text-white p-4 shadow-md">
        <h1 class="text-lg font-bold text-center">Documentación de Splitter (Planta Externa)</h1>
    </header>

    <main class="flex-1 p-4 max-w-lg mx-auto w-full">
        <div class="bg-white p-5 rounded-lg shadow-md border border-gray-200">
            
            <h2 class="text-xl font-bold text-gray-800 mb-4">Registro de Splitter</h2>

            <form id="externalPlantForm" class="space-y-4">
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Descripción del Splitter</label>
                    <input type="text" id="splitterDescription" required
                        class="block w-full rounded-md border-gray-300 border p-2 text-sm bg-gray-50 focus:ring-blue-500 focus:border-blue-500"
                        placeholder="Ingrese descripción">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Ubicación</label>
                        <select id="location" class="block w-full rounded-md border-gray-300 border p-2 bg-white text-sm">
                            <option value="Poste">Poste</option>
                            <option value="Pozo">Pozo</option>
                            <option value="Distrito">Distrito</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Puertos</label>
                        <select id="ports" class="block w-full rounded-md border-gray-300 border p-2 bg-white text-sm">
                            <option value="8">1:8</option>
                            <option value="16">1:16</option>
                            <option value="32">1:32</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Marca de Caja</label>
                        <select id="boxBrand" class="block w-full rounded-md border-gray-300 border p-2 bg-white text-sm">
                            <option value="Huawei">Huawei</option>
                            <option value="Tyco">Tyco</option>
                            <option value="FiberHome">FiberHome</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Tipo de Propiedad</label>
                        <select id="boxType" onchange="toggleBuildingFields(this.value)" class="block w-full rounded-md border-gray-300 border p-2 bg-white text-sm">
                            <option value="Publico">Vía Pública</option>
                            <option value="Condominio">Condominio</option>
                            <option value="Edificio">Edificio / Vertical</option>
                        </select>
                    </div>
                </div>

                <div id="viewStubBuildingFields" class="hidden bg-blue-50 p-3 rounded-md border border-blue-200 space-y-2 transition-all">
                    <p class="text-xs font-bold text-blue-700 uppercase tracking-wide">Datos de Infraestructura Vertical</p>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="buildingFloor" placeholder="Piso (Ej. 4)" class="p-2 border rounded bg-white text-sm">
                        <input type="text" id="buildingDept" placeholder="Depto / Interior" class="p-2 border rounded bg-white text-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nombre de la Caja</label>
                    <select id="boxName" class="block w-full rounded-md border-gray-300 border p-2 bg-white text-sm">
                        <option value="Caja_01">Caja 01</option>
                        <option value="Caja_02">Caja 02</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Código QR</label>
                    <div class="relative rounded-md shadow-sm">
                        <input type="text" id="qrCode" required
                            class="block w-full rounded-md border-gray-300 border p-2 pr-10 text-sm bg-gray-50 uppercase" 
                            placeholder="Escanee el código">
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer text-blue-600 hover:text-blue-800" id="btnScan">
                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h.01M16 20h2a2 2 0 002-2v-2M16 4h2a2 2 0 012 2v2M8 20H6a2 2 0 01-2-2v-2M8 4H6a2 2 0 00-2 2v2m4 4h4v4H8V8z" />
                            </svg>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Dirección</label>
                    <input type="text" id="registerAddress" required
                        class="block w-full rounded-md border-gray-300 border p-2 text-sm bg-gray-50"
                        placeholder="Buscando ubicación o ingrese dirección...">
                </div>

            </form>
        </div>
    </main>

    <footer class="p-4 bg-gray-100 max-w-lg mx-auto w-full">
        <button type="button" id="btnSubmit" 
            class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 px-4 rounded-lg shadow-md transition duration-150">
            DOCUMENTAR PLANTA EXTERNA
        </button>
    </footer>

    <script>
        // Función para simular la lógica del ViewStub (Muestra campos si es Edificio/Condominio)
        function toggleBuildingFields(value) {
            const stub = document.getElementById('viewStubBuildingFields');
            if (value === 'Edificio' || value === 'Condominio') {
                stub.classList.remove('hidden');
            } else {
                stub.classList.add('hidden');
                document.getElementById('buildingFloor').value = '';
                document.getElementById('buildingDept').value = '';
            }
        }

        // Lógica de envío al Cloudflare Worker
        document.getElementById('btnSubmit').addEventListener('click', async () => {
            const payload = {
                description: document.getElementById('splitterDescription').value.trim(),
                location_type: document.getElementById('location').value,
                ports_count: parseInt(document.getElementById('ports').value, 10),
                box_brand: document.getElementById('boxBrand').value,
                property_type: document.getElementById('boxType').value,
                box_name: document.getElementById('boxName').value,
                qr_code: document.getElementById('qrCode').value.trim().toUpperCase(),
                address: document.getElementById('registerAddress').value.trim(),
                // Si el ViewStub está visible, añade esos campos
                building_details: document.getElementById('boxType').value !== 'Publico' ? {
                    floor: document.getElementById('buildingFloor').value.trim(),
                    department: document.getElementById('buildingDept').value.trim()
                } : null,
                timestamp: new Date().toISOString()
            };

            // Validación de campos requeridos
            if (!payload.description || !payload.qr_code || !payload.address) {
                alert("⚠️ Por favor complete los campos obligatorios (Descripción, QR y Dirección).");
                return;
            }

            try {
                const response = await fetch('https://tu-worker.tu-subdominio.workers.dev/api/external-plant', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const resData = await response.json();

                if (response.ok) {
                    alert("✅ Infraestructura de Planta Externa registrada con éxito.");
                    document.getElementById('externalPlantForm').reset();
                    document.getElementById('viewStubBuildingFields').classList.add('hidden');
                } else {
                    alert("❌ Error: " + resData.message);
                }
            } catch (err) {
                console.error(err);
                alert("❌ Error de conexión con el Worker.");
            }
        });

        // Evento para el botón de escaneo
        document.getElementById('btnScan').addEventListener('click', () => {
            console.log("Activando cámara para lectura de QR...");
        });
    </script>
</body>
</html>
